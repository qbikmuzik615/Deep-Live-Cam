name: Deep-Live-Cam Automation\n\non:\n  push:\n    branches:\n      - main\n  pull_request:\n    branches:\n      - main\n\njobs:\n  setup-dependencies:\n    runs-on: ubuntu-latest\n    steps:\n    - name: Checkout repository\n      uses: actions/checkout@v3\n    - name: Set up Python Environment\n      uses: actions/setup-python@v4\n      with:\n        python-version: 3.8\n    - name: Install dependencies\n      run: |\n        python -m pip install --upgrade pip\n        pip install -r requirements.txt\n    - name: Lint and QA checks\n      run: |\n        pip install flake8\n        flake8 . || echo "Lint warnings detected"\n  qa-agent:\n    runs-on: ubuntu-latest\n    steps:\n    - name: Checkout repository for Copilot Agent formatting check\n      uses: actions/checkout@v3\n    - name: Copilot Assisted Format Linter\n      run: |\n        pip install black\n        black .\n